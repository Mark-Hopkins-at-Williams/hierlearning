<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#080018"/>
  <!-- Gardiner O4: floor plan of a shelter (H hieroglyph)
       Three full walls (top, left, right), entry gap on bottom-left,
       small internal room-divider at the right edge of the gap. -->
  <g stroke="#ff6020" stroke-width="3.5" stroke-linecap="square">
    <!-- top wall -->
    <line x1="5"  y1="8"  x2="27" y2="8"/>
    <!-- left wall -->
    <line x1="5"  y1="8"  x2="5"  y2="26"/>
    <!-- right wall -->
    <line x1="27" y1="8"  x2="27" y2="26"/>
    <!-- bottom-right floor (from divider to right wall) -->
    <line x1="14" y1="26" x2="27" y2="26"/>
    <!-- internal room divider (rises from right edge of entry gap) -->
    <line x1="14" y1="21" x2="14" y2="26"/>
  </g>
</svg>
